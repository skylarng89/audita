<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Request Completed</title></head>
<body style="font-family: Inter, sans-serif; color: #111827; background: #f3f4f6; padding: 32px;">
  <div style="max-width: 520px; margin: 0 auto; background: #fff; border-radius: 8px; padding: 40px;">
    <h1 style="color: #059669; font-size: 24px; margin-top: 0;">Request Completed</h1>
    <p>Hi <span th:text="${recipientName}">User</span>,</p>
    <p>The following change request has been marked as completed:</p>
    <div style="background:#D1FAE5;border-radius:6px;padding:16px;margin:16px 0;">
      <strong th:text="${crTitle}">Change Request Title</strong>
    </div>
    <a th:href="${crLink}" style="display:inline-block;background:#059669;color:#fff;text-decoration:none;padding:12px 28px;border-radius:6px;font-weight:600;margin:16px 0;">
      View Change Request
    </a>
    <hr style="border:none;border-top:1px solid #E5E7EB;margin:24px 0;">
    <p style="color:#6B7280;font-size:12px;">Audita &mdash; Secure Change Management</p>
  </div>
</body>
</html>
