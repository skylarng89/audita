<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Audit Export Ready</title>
</head>
<body style="font-family: Arial, sans-serif; color: #111827; line-height: 1.5;">
  <h2 style="margin-bottom: 8px;">Your audit export is ready</h2>
  <p style="margin-top: 0;">The export has been generated and compressed for download.</p>
  <p>
    <strong>Date range:</strong>
    <span th:text="${from}">2026-01-01</span>
    to
    <span th:text="${to}">2026-01-31</span>
  </p>
  <p>
    <a th:href="${downloadUrl}" style="display: inline-block; padding: 10px 14px; background: #111827; color: #ffffff; text-decoration: none; border-radius: 6px;">
      Download Audit Export
    </a>
  </p>
  <p>
    This link expires on
    <strong th:text="${#temporals.format(expiresAt, 'yyyy-MM-dd HH:mm z')}">2026-05-22 12:00 UTC</strong>.
  </p>
</body>
</html>
