<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>You're invited to Audita</title></head>
<body style="font-family: Inter, sans-serif; color: #111827; background: #f3f4f6; padding: 32px;">
  <div style="max-width: 520px; margin: 0 auto; background: #fff; border-radius: 8px; padding: 40px;">
    <h1 style="color: #1D3A8A; font-size: 24px; margin-top: 0;">Welcome to Audita</h1>
    <p>Hi <span th:text="${fullName}">User</span>,</p>
    <p>You've been invited to join <strong th:text="${orgName}">Your Organisation</strong> on Audita. Accept your invitation to set up your account. This link expires in <span th:text="${expiryHours}">48</span> hours.</p>
    <a th:href="${acceptLink}" style="display:inline-block;background:#1D3A8A;color:#fff;text-decoration:none;padding:12px 28px;border-radius:6px;font-weight:600;margin:16px 0;">
      Accept Invitation
    </a>
    <p style="color:#6B7280;font-size:13px;">If you didn't expect this invitation, you can safely ignore this email.</p>
    <hr style="border:none;border-top:1px solid #E5E7EB;margin:24px 0;">
    <p style="color:#6B7280;font-size:12px;">Audita &mdash; Secure Change Management</p>
  </div>
</body>
</html>
