name: CI and Release Images
"on":
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Run API tests
        working-directory: audita-api
        run: ./gradlew :api:test --no-daemon

  web-tests:
    name: Web Build and Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: audita-web/pnpm-lock.yaml

      - name: Install web dependencies
        working-directory: audita-web
        run: pnpm install --frozen-lockfile

      - name: Run web tests
        working-directory: audita-web
        run: pnpm test

      - name: Run web build
        working-directory: audita-web
        run: pnpm build

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [api-tests, web-tests]
    name: Release and Publish Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: audita-web/pnpm-lock.yaml

      # Tests already run in dedicated api-tests and web-tests jobs via needs dependency
      # - name: Verify API
      #   working-directory: audita-api
      #   run: ./gradlew :api:test --no-daemon

      # - name: Verify web
      #   working-directory: audita-web
      #   run: |
      #     pnpm install --frozen-lockfile
      #     pnpm test
      #     pnpm build

      - name: Resolve image names
        id: images
        run: |
          namespace="${{ vars.DOCKERHUB_NAMESPACE }}"
          if [[ -z "$namespace" ]]; then
            namespace="${{ secrets.DOCKERHUB_USERNAME }}"
          fi

          api_image_name="${{ vars.DOCKERHUB_API_IMAGE_NAME }}"
          web_image_name="${{ vars.DOCKERHUB_WEB_IMAGE_NAME }}"

          if [[ -z "$api_image_name" ]]; then
            api_image_name="audita-api"
          fi

          if [[ -z "$web_image_name" ]]; then
            web_image_name="audita-web"
          fi

          echo "api_image=${namespace}/${api_image_name}" >> "$GITHUB_OUTPUT"
          echo "web_image=${namespace}/${web_image_name}" >> "$GITHUB_OUTPUT"

      - name: Calculate release version
        id: version
        run: |
          git fetch --tags --force

          latest_tag="$(git tag -l 'v*' --sort=-v:refname | head -n 1)"
          current_sha="$(git rev-parse HEAD)"

          if [[ -z "$latest_tag" ]]; then
            version="v0.1.0"
          else
            tagged_sha="$(git rev-list -n 1 "$latest_tag")"
            if [[ "$tagged_sha" == "$current_sha" ]]; then
              version="$latest_tag"
            elif [[ "$latest_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              major="${BASH_REMATCH[1]}"
              minor="${BASH_REMATCH[2]}"
              patch="${BASH_REMATCH[3]}"

              # Inspect commit subjects and bodies since the last tag.
              # feat!: / BREAKING CHANGE → major; feat: → minor; everything else → patch.
              commit_log="$(git log "${latest_tag}..HEAD" --format="%s%n%b")"

              has_breaking=false
              has_feat=false
              if echo "$commit_log" | grep -qE '^[a-z]+(\([^)]*\))?!:' \
                 || echo "$commit_log" | grep -q 'BREAKING CHANGE'; then
                has_breaking=true
              elif echo "$commit_log" | grep -qE '^feat(\([^)]*\))?:'; then
                has_feat=true
              fi

              if [[ "$has_breaking" == "true" ]]; then
                version="v$((major + 1)).0.0"
              elif [[ "$has_feat" == "true" ]]; then
                version="v${major}.$((minor + 1)).0"
              else
                version="v${major}.${minor}.$((patch + 1))"
              fi
            else
              version="v0.1.0"
            fi
          fi

          if [[ "$version" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major_minor="v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          else
            major_minor="v0.1"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${major_minor}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: ./audita-api
          file: ./audita-api/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.api_image }}:latest
            ${{ steps.images.outputs.api_image }}:${{ steps.version.outputs.version }}
            ${{ steps.images.outputs.api_image }}:${{ steps.version.outputs.major_minor }}
            ${{ steps.images.outputs.api_image }}:sha-${{ github.sha }}

      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: ./audita-web
          file: ./audita-web/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.web_image }}:latest
            ${{ steps.images.outputs.web_image }}:${{ steps.version.outputs.version }}
            ${{ steps.images.outputs.web_image }}:${{ steps.version.outputs.major_minor }}
            ${{ steps.images.outputs.web_image }}:sha-${{ github.sha }}

      - name: Create and push git tag
        run: |
          version="${{ steps.version.outputs.version }}"
          if git rev-parse "$version" >/dev/null 2>&1; then
            echo "Tag ${version} already exists locally."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$version" -m "Release ${version}"
          fi

          if git ls-remote --tags origin "refs/tags/${version}" | grep -q "refs/tags/${version}"; then
            echo "Tag ${version} already exists remotely."
          else
            git push origin "$version"
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true

      - name: Write job summary
        run: |
          version="${{ steps.version.outputs.version }}"
          api_image="${{ steps.images.outputs.api_image }}"
          web_image="${{ steps.images.outputs.web_image }}"
          sha="${{ github.sha }}"
          short_sha="${sha:0:7}"
          actor="${{ github.actor }}"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Release ${version}

          | Field        | Value |
          | ------------ | ----- |
          | Version      | \`${version}\` |
          | Commit       | \`${short_sha}\` |
          | Triggered by | ${actor} |
          | Run          | [View run](${run_url}) |

          ### Images pushed

          | Image | Tags |
          | ----- | ---- |
          | \`${api_image}\` | \`latest\`, \`${version}\`, \`sha-${short_sha}\` |
          | \`${web_image}\` | \`latest\`, \`${version}\`, \`sha-${short_sha}\` |
          EOF
