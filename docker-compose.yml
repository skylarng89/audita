name: audita

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: audita-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: audita
      POSTGRES_USER: audita
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "7432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audita -d audita"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MailHog (local SMTP catcher — dev only) ─────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: audita-mailhog
    restart: unless-stopped
    ports:
      - "7025:1025" # SMTP
      - "8025:8025" # Web UI

  # ── Spring Boot API ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./audita-api
      dockerfile: Dockerfile
    container_name: audita-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/audita
      DATABASE_USERNAME: audita
      DATABASE_PASSWORD: secret
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_SECONDS: 900
      REFRESH_TOKEN_EXPIRY_DAYS: 7
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      APP_BASE_URL: http://localhost:3000
      DEFAULT_SMTP_HOST: mailhog
      DEFAULT_SMTP_PORT: 1025
      DEFAULT_SMTP_AUTH: "false"
      DEFAULT_SMTP_TLS: "false"
      STORAGE_BACKEND: LOCAL
      STORAGE_LOCAL_BASE_PATH: /data/uploads
    volumes:
      - uploads:/data/uploads
    ports:
      - "7080:8080"
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Nuxt 3 Frontend ─────────────────────────────────────────────────────────
  web:
    build:
      context: ./audita-web
      dockerfile: Dockerfile
    container_name: audita-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NUXT_PUBLIC_API_BASE: http://api:8080
    ports:
      - "7000:3000"

volumes:
  pgdata:
  uploads:
