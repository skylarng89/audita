name: audita

services:
  # ── PostgreSQL ──
  db:
    image: postgres:18.3-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql
    ports:
      - "7432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "PGPASSWORD=${DB_PASSWORD} psql -U ${DB_USERNAME} -d ${DB_NAME} -h ${DB_HOST} -p ${DB_PORT} -c 'SELECT 1'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      audita-network:
        aliases:
          - db.audita.internal
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true

  # ── Spring Boot API ──
  api:
    image: skylarng89/audita-api:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DB_URL}
      DATABASE_USERNAME: ${DB_USERNAME}
      DATABASE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_SECONDS: ${JWT_EXPIRY_SECONDS}
      REFRESH_TOKEN_EXPIRY_DAYS: ${REFRESH_TOKEN_EXPIRY_DAYS}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      APP_BASE_URL: ${APP_BASE_URL}
      DEFAULT_SMTP_FROM: ${SMTP_FROM}
      DEFAULT_SMTP_HOST: ${SMTP_HOST}
      DEFAULT_SMTP_PORT: ${SMTP_PORT}
      DEFAULT_SMTP_USERNAME: ${SMTP_USERNAME}
      DEFAULT_SMTP_PASSWORD: ${SMTP_PASSWORD}
      DEFAULT_SMTP_AUTH: ${SMTP_AUTH}
      DEFAULT_SMTP_TLS: ${SMTP_TLS}
      STORAGE_BACKEND: ${STORAGE_BACKEND}
      STORAGE_LOCAL_BASE_PATH: ${STORAGE_LOCAL_BASE_PATH}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      MANAGEMENT_HEALTH_MAIL_ENABLED: ${MANAGEMENT_HEALTH_MAIL_ENABLED}
    volumes:
      - api_uploads:/data/uploads
    ports:
      - "7080:8080"
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      audita-network:
        aliases:
          - api.audita.internal
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true

  # ── Nuxt 3 Frontend ──
  web:
    image: skylarng89/audita-web:latest
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NUXT_PUBLIC_API_BASE: ${APP_BASE_PATH}
      NUXT_API_INTERNAL_BASE: ${APP_INTERNAL_BASE_PATH}
    ports:
      - "7000:3000"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      audita-network:
        aliases:
          - web.audita.internal
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true

volumes:
  db_data:
  api_uploads:

networks:
  audita-network:
    driver: bridge
