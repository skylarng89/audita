name: audita

services:
  # ── PostgreSQL ──
  db:
    image: postgres:18.3-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql
    ports:
      - "127.0.0.1:7432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "PGPASSWORD=${DB_PASSWORD} psql -U ${DB_USERNAME} -d ${DB_NAME} -h localhost -p 5432 -c 'SELECT 1'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      audita-network:
        aliases:
          - db.audita.internal
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true

  # ── Spring Boot API ──
  api:
    image: skylarng89/audita-api:1.0.0
    restart: unless-stopped
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DB_URL}
      DATABASE_USERNAME: ${DB_USERNAME}
      DATABASE_PASSWORD: ${DB_PASSWORD}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_SECONDS: ${JWT_EXPIRY_SECONDS}
      JWT_STREAM_EXPIRY_SECONDS: ${JWT_STREAM_EXPIRY_SECONDS}
      REFRESH_TOKEN_EXPIRY_DAYS: ${REFRESH_TOKEN_EXPIRY_DAYS}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      APP_BASE_URL: ${APP_BASE_URL}
      API_BASE_URL: ${API_BASE_URL}
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      TRUST_FORWARDED_HEADERS: ${TRUST_FORWARDED_HEADERS}
      BOOTSTRAP_SETUP_TOKEN: ${BOOTSTRAP_SETUP_TOKEN}
      DEFAULT_SMTP_FROM: ${SMTP_FROM}
      DEFAULT_SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      DEFAULT_SMTP_HOST: ${SMTP_HOST}
      DEFAULT_SMTP_PORT: ${SMTP_PORT}
      DEFAULT_SMTP_USERNAME: ${SMTP_USERNAME}
      DEFAULT_SMTP_PASSWORD: ${SMTP_PASSWORD}
      DEFAULT_SMTP_AUTH: ${SMTP_AUTH}
      DEFAULT_SMTP_TLS: ${SMTP_TLS}
      STORAGE_BACKEND: ${STORAGE_BACKEND}
      STORAGE_LOCAL_BASE_PATH: ${STORAGE_LOCAL_BASE_PATH}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION}
      STORAGE_S3_ACCESS_KEY: ${STORAGE_S3_ACCESS_KEY}
      STORAGE_S3_SECRET_KEY: ${STORAGE_S3_SECRET_KEY}
      UPLOAD_MAX_SIZE_BYTES: ${UPLOAD_MAX_SIZE_BYTES}
      UPLOAD_MAX_SIZE: ${UPLOAD_MAX_SIZE}
      UPLOAD_ALLOWED_MIME_TYPES: ${UPLOAD_ALLOWED_MIME_TYPES}
      MANAGEMENT_HEALTH_MAIL_ENABLED: ${MANAGEMENT_HEALTH_MAIL_ENABLED}
      INVITE_EXPIRY_HOURS: ${INVITE_EXPIRY_HOURS}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE}
      AUDITA_AUTH_REFRESH_COOKIE_ENCRYPTION_KEY: ${AUDITA_AUTH_REFRESH_COOKIE_ENCRYPTION_KEY}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT}
      LOG_LEVEL_APP: ${LOG_LEVEL_APP}
      LOG_LEVEL_FLYWAY: ${LOG_LEVEL_FLYWAY}
      LOG_FILE: ${LOG_FILE}
      LOG_FILE_MAX_SIZE: ${LOG_FILE_MAX_SIZE}
      LOG_FILE_MAX_HISTORY: ${LOG_FILE_MAX_HISTORY}
      LOG_FILE_TOTAL_SIZE_CAP: ${LOG_FILE_TOTAL_SIZE_CAP}
    volumes:
      - ./logs:/data/logs
      - api_uploads:/data/uploads
    ports:
      - "7080:8080"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      audita-network:
        aliases:
          - api.audita.internal
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    # Healthcheck: the hardened JVM image has no shell, curl, or wget.
    # API health should be monitored at the orchestrator level (Kubernetes,
    # Docker Swarm, Nomad) via the actuator /actuator/health endpoint.
    # Docker compose native healthcheck is not feasible with this image.

  # ── Nuxt 3 Frontend ──
  web:
    build:
      context: ./audita-web
      dockerfile: Dockerfile
    image: skylarng89/audita-web:1.0.0
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/', function(r){process.exit(r.statusCode===200?0:1)}).on('error', function(){process.exit(1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      NUXT_PUBLIC_API_BASE: ${APP_BASE_PATH}
      NUXT_API_INTERNAL_BASE: ${APP_INTERNAL_BASE_PATH}
      NUXT_PUBLIC_APP_VERSION: ${APP_VERSION:-latest}
    ports:
      - "7001:3000"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      audita-network:
        aliases:
          - web.audita.internal
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true

volumes:
  db_data:
  api_uploads:

networks:
  audita-network:
    driver: bridge
