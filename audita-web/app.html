<!DOCTYPE html>
<html {{ HTML_ATTRS }}>
<head {{ HEAD_ATTRS }}>
{{ HEAD }}
<style>
  #app-loader {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f7f9fb;
    z-index: 9999;
  }
  @media (prefers-color-scheme: dark) {
    #app-loader { background: #020617; }
  }
  .app-loader-spinner {
    width: 36px;
    height: 36px;
    border: 3px solid #e2e8f0;
    border-top-color: #2563eb;
    border-radius: 50%;
    animation: app-loader-spin 0.7s linear infinite;
  }
  @keyframes app-loader-spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body {{ BODY_ATTRS }}>
<div id="app-loader"><div class="app-loader-spinner"></div></div>
{{ APP }}
</body>
</html>
