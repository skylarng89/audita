<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Void ITSM - Sign In</title>

                extend: {
                    "colors": {

                        "surface-container-highest": "#2d3449",

<style>
        .glass-card {
            background: rgba(34, 42, 61, 0.6);
            backdrop-filter: blur(24px);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #adc6ff 0%, #003d88 100%);
        }
        .input-focus-glow:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(173, 198, 255, 0.3);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex items-center justify-center p-6 selection:bg-primary-container selection:text-on-primary-container">
<!-- Ambient Background Elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[20%] -left-[10%] w-[60%] h-[60%] rounded-full bg-primary/10 blur-[120px]"></div>
<div class="absolute -bottom-[20%] -right-[10%] w-[50%] h-[50%] rounded-full bg-tertiary/5 blur-[100px]"></div>
</div>
<!-- Login Container -->
<main class="w-full max-w-[440px] z-10">
<!-- Brand Identity -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-surface-container-high mb-6 shadow-2xl">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">dark_mode</span>
</div>
<h1 class="font-headline text-4xl font-extrabold tracking-tight text-primary mb-2">Void ITSM</h1>
<p class="text-on-surface-variant font-medium">Enterprise Tier Identity Gateway</p>
</div>
<!-- Auth Card -->
<div class="glass-card rounded-xl p-8 shadow-[0_20px_40px_rgba(0,0,0,0.4)]">
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block font-label text-sm font-semibold text-on-surface-variant px-1" for="email">Corporate Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg group-focus-within:text-primary transition-colors">
                            alternate_email
                        </span>
<input class="w-full h-12 pl-12 pr-4 bg-surface-container-highest border-none rounded-lg text-on-surface placeholder:text-outline/50 font-body input-focus-glow transition-all" id="email" placeholder="username@company.com" required="" type="email"/>
</div>
</div>
<!-- Security Key Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block font-label text-sm font-semibold text-on-surface-variant" for="security-key">Security Key</label>
<a class="text-primary text-xs font-semibold hover:underline decoration-2 underline-offset-4" href="#">Reset Key</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg group-focus-within:text-primary transition-colors">
                            encrypted
                        </span>
<input class="w-full h-12 pl-12 pr-12 bg-surface-container-highest border-none rounded-lg text-on-surface placeholder:text-outline/50 font-body input-focus-glow transition-all" id="security-key" placeholder="••••••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-12 primary-gradient text-on-primary font-bold rounded-lg hover:opacity-90 active:scale-[0.98] transition-all shadow-lg flex items-center justify-center gap-2" type="submit">
<span>Authenticate</span>
<span class="material-symbols-outlined text-xl">login</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-8 h-4 flex items-center justify-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full h-[1px] bg-outline-variant/20"></div>
</div>
<span class="relative px-4 bg-[#1e273a] text-xs font-bold text-outline uppercase tracking-widest">or continue with</span>
</div>
<!-- SSO Actions -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 h-12 bg-transparent border border-outline-variant/15 text-on-surface font-semibold rounded-lg hover:bg-surface-bright transition-colors active:scale-[0.98]">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm">Google</span>
</button>
<button class="flex items-center justify-center gap-3 h-12 bg-transparent border border-outline-variant/15 text-on-surface font-semibold rounded-lg hover:bg-surface-bright transition-colors active:scale-[0.98]">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 23 23">
<path d="M0 0h11v11H0z" fill="#f3f3f3"></path>
<path d="M12 0h11v11H12z" fill="#f3f3f3"></path>
<path d="M0 12h11v11H0z" fill="#f3f3f3"></path>
<path d="M12 12h11v11H12z" fill="#f3f3f3"></path>
</svg>
<span class="text-sm">Microsoft</span>
</button>
</div>
</div>
<!-- Footer Links -->
<footer class="mt-8 flex flex-col items-center gap-4">
<p class="text-on-surface-variant text-sm">
                New to the platform? <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4" href="#">Register Workspace</a>
</p>
<div class="flex gap-6">
<a class="text-outline text-xs font-medium hover:text-on-surface transition-colors" href="#">Security Policy</a>
<a class="text-outline text-xs font-medium hover:text-on-surface transition-colors" href="#">System Status</a>
<a class="text-outline text-xs font-medium hover:text-on-surface transition-colors" href="#">Global Support</a>
</div>
</footer>
</main>
<!-- Visual Anchor Decorations -->
<div class="fixed top-12 left-12 opacity-20 hidden lg:block">
<div class="space-y-4">
<div class="w-32 h-1 bg-primary rounded-full"></div>
<div class="w-24 h-1 bg-surface-container-highest rounded-full"></div>
<div class="w-40 h-1 bg-surface-container-highest rounded-full"></div>
</div>
</div>
<div class="fixed bottom-12 right-12 opacity-20 hidden lg:block">
<div class="space-y-4 flex flex-col items-end">
<div class="w-40 h-1 bg-surface-container-highest rounded-full"></div>
<div class="w-24 h-1 bg-surface-container-highest rounded-full"></div>
<div class="w-32 h-1 bg-tertiary rounded-full"></div>
</div>
</div>
</body></html>
